<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0c1224">
  <title>Live Translate Web</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">
    <header class="hero">
      <div>
        <div class="eyebrow">GitHub Pages Deployable Build</div>
        <h1>Live Translate Web</h1>
        <p>iPhone 友善的即時字幕 / 翻譯實驗版。以 GitHub 為主倉庫，方便後續維護與升級。</p>
      </div>
      <div class="badges">
        <span class="badge">Browser mic</span>
        <span class="badge">Local translation model</span>
        <span class="badge muted" id="speechSupportBadge">Checking speech support…</span>
      </div>
    </header>

    <section class="card controls">
      <div class="grid two">
        <label>
          來源語言
          <select id="sourceLang">
            <option value="zh-TW">繁體中文</option>
            <option value="en-US" selected>English</option>
            <option value="th-TH">ไทย</option>
            <option value="ja-JP">日本語</option>
            <option value="ko-KR">한국어</option>
          </select>
        </label>
        <label>
          目標語言
          <select id="targetLang">
            <option value="zh-TW" selected>繁體中文</option>
            <option value="en-US">English</option>
            <option value="th-TH">ไทย</option>
            <option value="ja-JP">日本語</option>
            <option value="ko-KR">한국어</option>
          </select>
        </label>
      </div>

      <div class="buttons">
        <button id="preloadBtn" class="primary">預載翻譯模型</button>
        <button id="startBtn" class="primary">開始麥克風</button>
        <button id="stopBtn" class="danger" disabled>停止</button>
        <button id="clearBtn">清除紀錄</button>
      </div>

      <div id="status" class="status">尚未開始</div>
      <div class="hint">
        第一次載入模型可能較久。若瀏覽器不支援即時語音辨識，仍可先用下方文字測試本地翻譯鏈路。
      </div>
      <div id="supportMatrix" class="support"></div>
    </section>

    <section class="card">
      <h2>即時字幕</h2>
      <div class="live original" id="liveOriginal">...</div>
      <div class="live translated" id="liveTranslated">...</div>
    </section>

    <section class="card">
      <h2>手動翻譯測試</h2>
      <textarea id="manualInput" rows="5" placeholder="如果麥克風辨識在你的瀏覽器不穩，先貼一句文字測試本地翻譯。"></textarea>
      <div class="buttons single-row">
        <button id="manualTranslateBtn" class="primary">翻譯這段文字</button>
      </div>
    </section>

    <section class="card">
      <h2>歷史紀錄</h2>
      <div id="history" class="history"></div>
    </section>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
